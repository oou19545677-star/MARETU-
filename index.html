            position: absolute;

            user-select: none;

        .mole.up {

            100% { transform: scale(1); filter: hue-rotate(0deg); }

}

    for (let audio of soundPool) {
        audio.volume = audioSettings.sfxVolume;
    }
}

        audio.currentTime = 0;

        function checkAchievements() {

            if (state.totalGoodHits >= 100) unlockAchievement('mb_cook');

            if (state.totalBadHits >= 20) unlockAchievement('bad_cook');
            if (state.totalBadHits >= 50) unlockAchievement('bad_crazy');
            // 连击
            if (state.maxComboEver >= 100) unlockAchievement('high_100');
            if (state.maxComboEver >= 150) unlockAchievement('high_150');
            if (state.maxComboEver >= 40 && Object.values(state.upgrades).every(v => v === 0)) unlockAchievement('high_40_nobuy');
            // 其他
            if (CONFIG.totalGameTime >= 100) unlockAchievement('dance_50');
            if (state.hitShinyCrit) unlockAchievement('golden_blast');
            if (audioSettings.bgmVolume >= 1 && audioSettings.sfxVolume >= 1) unlockAchievement('tuqu');
            if (state.catClicked) unlockAchievement('cat');
            if (state.namidaHit) unlockAchievement('namida');
            if (state.upgrades.pink >= 50) unlockAchievement('pink_fan');
            // 再演/再再演 由 handleRestart 触发

function getItemDesc(id, lv) {
    const yellowSpan = (num) => `<span style="color:yellow">${num}</span>`;
    const cyanSpan = (num) => `<span style="color:lightblue">${num}</span>`;

    const formatNum = (num) => Number.isInteger(num) ? num : num.toFixed(1);

    switch(id) {

            if (hasHigh150) extraPercent += 3;

        }

            if (hasNamida) baseBonus *= 1.5;
            const displayBonus = formatNum(baseBonus);
            return `能够剪掉${hasNamida ? cyanSpan(displayBonus) : yellowSpan(displayBonus)}%个刘海（什么！？）`;
        }
        case 'umnos':
            return `获得一次“重生”的机会（大概）`;
        case 'darling':
            return `Darling会保护你${yellowSpan(lv||1)}次`;
        case 'angel92':
            return (Math.floor(state.score) === 92 || state.upgrades.angel92 > 0) 
                ? `⁽⁽ଘ( ˊᵕˋ )ଓ⁾⁾*：天使の数字会让你“积分翻倍！”` 
                : `未解锁：这个东西需要满足一些东西才能购买...`;
        case 'shiny': {

        }
        case 'birth':
            return `让你从负${yellowSpan((lv||1)*3)}秒时开始游戏`;

        case 'aim': {

        function initShop() {
            try {
                const list = document.getElementById('shop-list');
                const normalItems = SHOP_ITEMS.filter(i => 
                    !i.special && i.id !== 'doctor' && i.id !== 'two_year_celebration'
                ).sort((a,b) => {
                    const priceA = state.upgrades[a.id] >= a.max ? Infinity : a.prices[state.upgrades[a.id]];
                    const priceB = state.upgrades[b.id] >= b.max ? Infinity : b.prices[state.upgrades[b.id]];
                    return priceA - priceB;
                });
                const angelItem = SHOP_ITEMS.find(i => i.id === 'angel92');
                const doctorItem = SHOP_ITEMS.find(i => i.id === 'doctor');
                const celebrationItem = SHOP_ITEMS.find(i => i.id === 'two_year_celebration');
                const finalItems = [...normalItems, angelItem, doctorItem, celebrationItem];

                list.innerHTML = finalItems.map(item => {
                const disabledDuringGame = !state.isGameOver ? 'disabled' : '';
                    if (!item) return '';
                    const curLv = state.upgrades[item.id] || 0;
                    const maxed = curLv >= item.max;
                    const price = item.prices ? item.prices[curLv] : 0;
                    const canAfford = state.score >= price;
                    const is92Locked = item.id === 'angel92' && state.upgrades.angel92 === 0 && Math.floor(state.score) !== 92;
                    const gameActive = !state.isGameOver; // 游戏中则为 true
                    let btnHtml = '';
                    if (item.id === 'two_year_celebration') {
                        btnHtml = `<button class="buy-btn ${state.score >= 100000 ? 'can-buy':''}" onclick="buyItem('two_year_celebration')">购买</button>`;
                    } else if (!item.special || (item.id === 'angel92' && !is92Locked)) {
                        if (!maxed) {
                            btnHtml = `<button class="buy-btn ${canAfford && state.isGameOver ? 'can-buy':''}" ${disabledDuringGame} onclick="buyItem('${item.id}')">${curLv === 0 ? '购买' : '升级'}</button>`;
                        } else {
                            btnHtml = `<button class="buy-btn" disabled style="opacity:0.5; cursor:not-allowed;">满级</button>`;
                        }
                    }

                    return `
                        <div class="shop-item ${is92Locked ? 'locked' : ''}" id="item-${item.id}">
                            <img src="${item.icon}" class="item-icon">
                            <div class="item-info">
                                <div class="item-name">${item.name} ${item.max > 1 ? `<span style="color:#2ecc71">Lv.${curLv}</span>` : ''}</div>
                                <div class="item-desc">${getItemDesc(item.id, curLv)}</div>
                                <div class="item-price">${is92Locked ? '条件未达成' : (maxed ? 'MAX' : '价格: ' + price)}</div>
                            </div>
                            ${btnHtml}
                        </div>
                    `;
                }).join('');
                console.log('商店渲染完成');
            } catch (e) {
                console.error('initShop 出错:', e);
            }
        }

        // ================= 购买逻辑 =================
        function buyItem(id) {
            if (!state.isGameOver) {
                showFloatingText("先好好打mb", window.innerWidth/2, window.innerHeight/2);
                return;
            }
            const item = SHOP_ITEMS.find(i => i.id === id);
            if (id === 'two_year_celebration') {
                if (state.score >= 100000) {
                    cancelAnimationFrame(speedrunInterval);
                    state.score -= 100000;
                    if (state.startTime) {
                        const timeDiff = Date.now() - state.startTime;
                        state.speedrunTime = (timeDiff / 1000).toFixed(2);
                    }
                    if (parseFloat(state.speedrunTime) <= 600) unlockAchievement('speed600');
                    triggerTwoYearCelebration();
                } else {
                    showFloatingText("积分不足...", window.innerWidth/2, window.innerHeight/2);
                }
                return;
            }

            const curLv = state.upgrades[id];
            const price = item.prices[curLv];
            if (curLv < item.max && state.score >= price) {
                if (id === 'doctor') {
                    document.getElementById('doctor-modal').style.display = 'flex';
                    return;
                }
                if (item.sfx) playSFX(item.sfx);
                else playSFX('default_buy.mp3');
                state.score -= price;
                state.upgrades[id]++;
                updateUI();
                initShop();
                checkAchievements();
            }
        }

        function confirmDoctor(yes) {
            document.getElementById('doctor-modal').style.display = 'none';
            if (yes) {
                const price = 666;
                if (state.score >= price) {
                    state.score -= price;
                    state.upgrades.doctor = 1;
                    state.isDoctorActive = true;
                    document.body.classList.add('distort-active');
                    setTimeout(() => document.body.classList.remove('distort-active'), 500);
                    playSFX('doctor.mp3');
                    showFloatingText("正在进行微调...", window.innerWidth/2, window.innerHeight/2);
                    updateUI();
                    initShop();
                }
            }
        }

        // ================= 游戏主循环 =================
        function startGame() {
            if (!state.isGameOver) return;
            state.idleSeconds = 0;
            state.isGameOver = false;
            CONFIG.totalGameTime = 20; 
            state.currentTime = - (state.upgrades.birth * 3);
            state.activeMoleHole = null;
            state.activeMoleHole2 = null;
            document.querySelectorAll('.mole').forEach(mole => {
                mole.classList.remove('up');
                mole.style.cssText = ''; 
            });
            state.hp = 4;
            state.combo = state.upgrades.birthLonging * 15;
            state.molesHit = 0;
            state.isUmnosUsed = false;
            state.is92Used = false;
            state.darlingRemaining = state.upgrades.darling;
            state.isDoctorActive = false;
            state.currentSpeedScale = 1.0;
            if (state.upgrades.angel92 > 0) {
                state.isAngel92Active = true;
                state.globalMultiplier = 2.0;
            } else {
                state.isAngel92Active = false;
                state.globalMultiplier = 1.0;
            }
            bgm.play().catch(e => console.log("等待用户交互后播放"));
            updateUI();
            timerDisp.innerText = `${state.currentTime}s/${CONFIG.totalGameTime}s`;
            timerDisp.style.visibility = 'visible';
            ctrlBtn.style.visibility = 'hidden';
            nextMole();
            timeLoop = setInterval(() => {
                state.currentTime++;
                timerDisp.innerText = `${state.currentTime}s/${Math.floor(CONFIG.totalGameTime)}s`;
                updateComboAndCheck(state.combo);
                if (state.currentTime >= CONFIG.totalGameTime) {
                    gameOver();
                }
            }, 1000);
        }

function startSpeedrunLoop() {
    function step() {
        if (!state.startTime) return;
        const elapsed = (Date.now() - state.startTime) / 1000;
        speedrunTimer.innerText = elapsed.toFixed(2) + 's';
        if (elapsed >= 3000) unlockAchievement('addiction');
        speedrunInterval = requestAnimationFrame(step);
    }
    speedrunInterval = requestAnimationFrame(step);
}

        function nextMole() {
            if (state.activeMoleHole !== null || state.activeMoleHole2 !== null) return;
            if (state.isGameOver) return;
            state.activeMoleHole = null;
            state.activeMoleHole2 = null;
            spawnMole(1);
            if (state.upgrades.eraser > 0) spawnMole(2);
        }

        function spawnMole(slot) {
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * 25);
            } while (randomIndex === (slot === 1 ? state.activeMoleHole2 : state.activeMoleHole));

            if (slot === 1) state.activeMoleHole = randomIndex;
            else state.activeMoleHole2 = randomIndex;

            const hole = holes[randomIndex];
            const moleImg = hole.querySelector('.mole');
            const rand = Math.random();
            
            let effectiveScissors = state.upgrades.scissors;
            if (getAchievementById('namida')?.claimed) effectiveScissors *= 1.5;
            const badProb = Math.max(0, 0.10 - (effectiveScissors * 0.005));
            const doctorProb = state.upgrades.doctor > 0 ? 0.005 : 0;
            
            let type = 'good';
            if (rand < badProb) {
                type = 'bad';
            } else if (rand < badProb + doctorProb) {
                type = 'doctor';
            } else {
                if (!getAchievementById('namida')?.unlocked && Math.random() < 0.0005) {
                    type = 'namida';
                } else {
                    type = 'good';
                    if (state.upgrades.shiny > 0) {
                        let shinyProb = state.upgrades.shiny * 0.02;
                        if (getAchievementById('golden_blast')?.claimed) shinyProb += 0.05;
                        if (Math.random() < shinyProb) {
                            type = 'shiny';
                        }
                    }
                }
            }

            moleImg.src = type === 'namida' ? 'assets/nmd.png' : (type === 'bad' ? 'assets/liuhai.png' : (type === 'doctor' ? 'assets/moyi.png' : 'assets/mb.png'));
            moleImg.dataset.type = type;
            moleImg.style.filter = '';
            if (type === 'shiny') {
                moleImg.style.filter = 'drop-shadow(0 0 20px #ffee55) brightness(1.3) contrast(1.1)';
            }

            moleImg.classList.add('up');
            let hit = false;

            const finishMole = () => {
                moleImg.classList.remove('up');
                if (slot === 1) state.activeMoleHole = null;
                else state.activeMoleHole2 = null;
                if (state.activeMoleHole === null && state.activeMoleHole2 === null) {
                    const attemptNext = () => {
                        if (state.isGameOver) return;
                        nextMole();
                    };
                    const fallback = setTimeout(attemptNext, 250);
                    moleImg.addEventListener('transitionend', () => {
                        clearTimeout(fallback);
                        attemptNext();
                    }, { once: true });
                }
            };

            moleImg.onpointerdown = (e) => {
                e.stopPropagation();
                if (hit) return;
                hit = true;
                handleHit(type, e.clientX, e.clientY);
                finishMole();
            };

            let duration = CONFIG.baseRate;
            if (type === 'bad') {
                duration = 750;
                if (getAchievementById('speed600')?.claimed) duration *= 0.7;
            }
            state.moleTimeouts.push(setTimeout(() => {
                if (state.isGameOver) return;
                if (!hit) {
                    if (type !== 'bad' && type !== 'doctor') takeDamage();
                    finishMole();
                }
            }, duration));
        }

        holes.forEach(h => {
            h.onpointerdown = (e) => {
                if (e.target === h && !state.isGameOver) {
                    e.stopPropagation();
                    playSFX('cuo.mp3');
                    takeDamage();
                }
            };
        });

        function handleHit(type, x, y) {
            if (type === 'bad') {
                state.totalBadHits++;
                checkAchievements();
                if (getAchievementById('bad_cook')?.claimed) state.score += 1;
                if (getAchievementById('bad_crazy')?.claimed) state.score += 1;
                playSFX('cuo.mp3');
                takeDamage();
            } else if (type === 'doctor') {
                playSFX('magic.mp3'); 
                showFloatingText("医医医医生...我的病还能治好吗？！！（积分x5）", x, y);
                const container = document.getElementById('main-container');
                container.classList.add('poison-mushroom-active');
                state.isDoctorActive = true; 
                clearTimeout(window.mushroomTimer); 
                window.mushroomTimer = setTimeout(() => {
                    container.classList.remove('poison-mushroom-active');
                    state.isDoctorActive = false; 
                    showFloatingText("...正常了...？", window.innerWidth/2, window.innerHeight/2);
                }, 8000);
                state.molesHit++;
                state.combo++; 
            } else if (type === 'namida') {
                playSFX('namida.mp3');
                state.namidaHit = true;
                checkAchievements();
                showFloatingText("NAMIDA？！", x, y);
                state.molesHit++;
                state.combo++;
                let gain = 1.0;
                gain *= state.globalMultiplier;
                if (state.upgrades.pink > 0) {
                    let pinkMult = 1.10;
                    if (getAchievementById('pink_fan')?.claimed) pinkMult += 0.001;
                    gain *= Math.pow(pinkMult, state.upgrades.pink);
                }
                if (state.isDoctorActive) gain *= 6.0;
                if (getAchievementById('tuqu')?.claimed) gain *= 1.01;
                if (getAchievementById('cat')?.claimed) gain *= 1.01;
                state.score += gain;
                updateUI();
            } else {
                playSFX('zhong.mp3');
                state.molesHit++;
                state.combo++;
                state.totalGoodHits++;
                checkAchievements();

                if (state.upgrades.dance > 0) {
                    const chance = state.upgrades.dance * 0.04;
                    if (Math.random() < chance) {
                        let extraTime = 1;
                        if (getAchievementById('dance_50')?.claimed) extraTime += 0.333;
                        CONFIG.totalGameTime += extraTime;
                        showFloatingText("+1s", x, y - 40);
                    }
                }

                let gain = 1.0; 
                if (getAchievementById('mb_cook')?.claimed) gain += 0.05;
                if (getAchievementById('mb_crazy')?.claimed) gain += 0.05;
                gain *= state.globalMultiplier;
                showFloatingText(`满${state.combo}个...`, x, y);
                
                if (state.upgrades.pink > 0) {
                    let pinkMult = 1.10;
                    if (getAchievementById('pink_fan')?.claimed) pinkMult += 0.001;
                    gain *= Math.pow(pinkMult, state.upgrades.pink);
                }
                if (state.upgrades.nianwei > 0 && state.combo >= 20) {
                    const step = Math.floor(state.combo / 20);
                    let bonusPerStep = state.upgrades.nianwei * 0.4;
                    if (getAchievementById('high_100')?.claimed) bonusPerStep += 0.02;
                    if (getAchievementById('high_150')?.claimed) bonusPerStep += 0.03;
                    if (getAchievementById('high_40_nobuy')?.claimed) bonusPerStep += 0.05;
                    gain *= (1.0 + (step * bonusPerStep));
                }
                if (type === 'shiny') gain *= 6.0;
                
                let critProb = state.upgrades.aim * 0.02;
                if (getAchievementById('golden_blast')?.claimed) critProb += 0.05;
                if (Math.random() < critProb) {
                    gain *= 3.0;
                    showFloatingText("I'M HIGH!!!", x, y + 20); 
                    playSFX('crit.mp3');
                    if (type === 'shiny') {
                        state.hitShinyCrit = true;
                        checkAchievements();
                    }
                }
                if (state.isDoctorActive) gain *= 6.0;
                
                if (getAchievementById('tuqu')?.claimed) gain *= 1.01;
                if (getAchievementById('cat')?.claimed) gain *= 1.01;
                
                state.score += gain; 

                const needed = 40 - (state.upgrades.taste * 3);
                if (state.molesHit % needed === 0 && state.hp < 4) {
                    state.hp++;
                    updateUI();
                }
            }
            updateUI();
        }

        function takeDamage() {
            if (state.isGameOver) return;
if (state.darlingRemaining > 0) {
    state.darlingRemaining--;
    playSFX('ball.mp3');
    showFloatingText("这种事我没有听说过啊！", window.innerWidth/2, window.innerHeight/2);
    // 无需刷新商店，因为升级等级未变
    return;
}
            state.hp--;
            state.combo = 0;
            hpImg.classList.add('shake');
            setTimeout(() => hpImg.classList.remove('shake'), 350);
            if (state.hp <= 0) {
                if (state.upgrades.umnos > 0 && !state.isUmnosUsed) {
                    triggerUmnos();
                } else {
                    gameOver();
                }
            }
            updateUI();
        }

        function triggerUmnos() {
            state.isGameOver = true; 
            state.isUmnosUsed = true;
            clearInterval(timeLoop);
            state.moleTimeouts.forEach(clearTimeout);
            state.moleTimeouts = [];
            document.querySelectorAll('.mole').forEach(moleImg => moleImg.classList.remove('up'));
            const overlay = document.getElementById('umnos-overlay');
            const img = document.getElementById('umnos-img');
            overlay.style.display = 'flex';
            playSFX('umnos.mp3');
            showFloatingText("你是什么错都没有的！！", window.innerWidth / 2, window.innerHeight / 2 - 50);
            setTimeout(() => {
                img.style.transform = 'scale(10)';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    img.style.transform = 'scale(1)';
                    state.hp = 1;
                    state.isGameOver = false;
            state.idleSeconds = 0;   // 进入游戏就清零挂机累计，防止游戏中意外解锁
                    state.activeMoleHole = null;
                    state.activeMoleHole2 = null;
                    timeLoop = setInterval(() => {
                        state.currentTime++;
                        timerDisp.innerText = `${state.currentTime}s/${Math.floor(CONFIG.totalGameTime)}s`;
                        if (state.currentTime >= CONFIG.totalGameTime) {
                            gameOver();
                        }
                    }, 200);
                    nextMole(); 
                    updateUI();
                }, 2000); 
            }, 100);
        }

        function gameOver() {
            ctrlBtn.disabled = true;
            ctrlBtn.style.opacity = '0.5';
            playSFX('die.mp3');
            state.isGameOver = true;
            clearInterval(timeLoop);
            state.moleTimeouts.forEach(clearTimeout);
            state.moleTimeouts = [];
const finalScore = Math.floor(state.score);

// 成就：游戏结束时连击数正好为92
if (state.combo === 92) {
    unlockAchievement('angel_alt');
}

// 商店物品提示：游戏结束时积分正好为92且未获得天使92
if (finalScore === 92 && state.upgrades.angel92 === 0) {
    showFloatingText("ଘ( ˊᵕˋ )ଓ 天使92已在商店显现!", window.innerWidth/2, window.innerHeight/2);
}
            
            checkAchievements();
            timerDisp.style.visibility = 'hidden';
            ctrlBtn.style.visibility = 'visible';
            holes.forEach(h => h.querySelector('.mole').classList.remove('up'));
            initShop();
            scoreDisp.style.color = 'var(--neon-green)';
            setTimeout(() => { scoreDisp.style.color = '#fff'; }, 1000);
            setTimeout(() => {
                ctrlBtn.style.visibility = 'visible';
                ctrlBtn.disabled = false;
                ctrlBtn.style.opacity = '1';
                ctrlBtn.innerText = "开始游戏";
            }, 100);
        }

        function updateUI() {
            const hpIndex = 5 - state.hp;
            hpImg.src = `assets/hp${hpIndex}.png`;
            scoreDisp.innerText = `积分: ${Math.floor(state.score)}`;
        }

        function showCelebration(isDevMode) {
            const old = document.getElementById('celebration-container');
            if (old) old.remove();

            const container = document.createElement('div');
            container.id = 'celebration-container';
            container.style.cssText = `
                position: fixed; inset: 0;
                background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
                display: flex; flex-direction: column;
                justify-content: center; align-items: center;
                z-index: 10000; overflow: hidden;
            `;

            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'celeb-particle';
                const size = 4 + Math.random() * 8;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = '-20px';
                particle.style.background = `hsl(${Math.random() * 60 + 30}, 100%, 70%)`;
                particle.style.animationDuration = (4 + Math.random() * 6) + 's';
                particle.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(particle);
            }

            const textDiv = document.createElement('div');
            textDiv.style.cssText = `
                text-align: center; z-index: 10002;
                animation: fadeInUp 1s ease-out forwards;
            `;
            textDiv.innerHTML = `
                <div style="font-size: 48px; font-weight: bold; color: gold; letter-spacing: 4px; animation: glowPulse 2s infinite;">
                    🏆 全成就达成！ 🏆
                </div>
                <div style="margin-top: 20px; font-size: 24px; color: #fff; opacity: 0.9; letter-spacing: 2px;">
                    ${isDevMode ? '（开发者模式）' : '你真的好厉害w(ﾟДﾟ)w！'}
                </div>
                <button onclick="document.getElementById('celebration-container').remove()" style="
                    margin-top: 40px; padding: 12px 40px;
                    font-size: 20px; font-weight: bold;
                    background: linear-gradient(135deg, gold, #ffaa00);
                    color: #1a1a2e; border: none; border-radius: 30px;
                    cursor: pointer; letter-spacing: 2px;
                    box-shadow: 0 0 20px rgba(255,215,0,0.5);
                ">继续</button>
            `;
            container.appendChild(textDiv);
            document.body.appendChild(container);
        }

        function showFloatingText(txt, x, y) {
            const el = document.createElement('div');
            el.className = 'float-text';
            el.innerText = txt;
            el.style.left = x + 'px'; 
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }

        function triggerTwoYearCelebration() {
            state.isGameOver = true;
            clearInterval(timeLoop);
            state.moleTimeouts.forEach(clearTimeout);
            state.moleTimeouts = [];
            const celebrationDiv = document.createElement('div');
            celebrationDiv.style.cssText = `
                position: fixed; inset: 0; 
                background: rgba(0,0,0,0.95); 
                display: flex; flex-direction: column;
                justify-content: center; align-items: center;
                z-index: 9999; color: gold; font-size: 40px;
                text-align: center; text-shadow: 0 0 20px #f1c40f;
                font-weight: bold; font-family: sans-serif;
            `;
            celebrationDiv.innerHTML = `
                <div style="animation: zoomIn 0.8s ease-out;">MARETU同人研学群</div>
                <div style="margin-top: 20px; animation: zoomIn 1.2s ease-out;">两周年快乐！！(*^▽^*)</div>
                <div style="margin-top: 15px; font-size: 24px; color: #fff;">
                    通关用时：${state.speedrunTime} 秒
                </div>
                <button id="restart-btn" onclick="handleRestart()" style="
                    margin-top: 30px; padding: 12px 30px; font-size: 22px; background: gold; color: black; border: none; border-radius: 8px; cursor: pointer;">再玩一次</button>
            `;
            document.body.appendChild(celebrationDiv);
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes zoomIn {
                    0% { transform: scale(0.5); opacity: 0; }
                    100% { transform: scale(1); opacity: 1; }
                }
                #restart-btn:hover { transform: scale(1.1); }
                #restart-btn:active { transform: scale(0.95); }
            `;
            document.head.appendChild(style);
        }

        ctrlBtn.onclick = startGame;
        initShop();
        renderAchievements();
    </script> 

    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <filter id="mushroom-distort">
                <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="2" seed="1" result="turbulence">
                    <animate attributeName="seed" from="1" to="100" dur="10s" repeatCount="indefinite" />
                </feTurbulence>
                <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="20" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>

</body>
