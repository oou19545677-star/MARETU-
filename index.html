<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mb：为什么打我？！</title>
    <style>
        :root {
            --primary-bg: #121212;
            --panel-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-color: #ff4757;
            --neon-green: #2ecc71;
            --neon-gold: #f1c40f;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--primary-bg);
            color: var(--text-color);
            font-family: 'Segoe UI', "Microsoft YaHei", sans-serif;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* 统一大按钮 */
        .game-btn {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            transition: all 0.2s;
        }
        .game-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(46, 204, 113, 0.5); }
        .game-btn:active { transform: translateY(1px); }

        /* 教程遮罩层 */
        #tutorial-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #tutorial-img { 
            max-width: 70%; 
            max-height: 60%; 
            border: 3px solid rgba(255,255,255,0.1); 
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        /* 游戏主容器 */
        #main-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* ================= 左侧游戏区 ================= */
        #game-area {
            flex: 7;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px 20px;
            box-sizing: border-box;
        }

#volume-control {
    position: absolute; 
    bottom: 20px; 
    left: 20px; 
    z-index: 999;
}

        /* 顶部UI条 */
        #top-ui {
            width: 100%;
            max-width: 700px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #hp-ui { display: flex; align-items: center; }
        #hp-img { width: 55px; height: 55px; object-fit: contain; }
        
        .shake { animation: violent-shake 0.35s both; }
        @keyframes violent-shake {
            0% { transform: translate(0, 0); }
            15% { transform: translate(-8px, 4px) rotate(-3deg); }
            30% { transform: translate(8px, -4px) rotate(3deg); }
            45% { transform: translate(-8px, -2px) rotate(-2deg); }
            60% { transform: translate(6px, 4px) rotate(1deg); }
            75% { transform: translate(-4px, -2px) rotate(-1deg); }
            100% { transform: translate(0, 0); }
        }

        #speed-ui { font-size: 20px; color: #888; font-weight: bold; }

        #score-display {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
            margin-top: -10px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 650px;
            background: #222;
            padding: 15px;
            border-radius: 16px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }
        .hole {
            aspect-ratio: 1;
            background: #111;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 3px solid #333;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.8);
        }
.mole {
    position: absolute;
    /* 1. 移除 top，因为它和 bottom 冲突 */
    /* top: -3%; */ 
    
    /* 2. 这里的 bottom 控制“缩回”时的位置，设为 -100% 刚好隐藏 */
    bottom: -100%; 
    
    /* 3. 水平居中：left 配合 transform 是最稳的 */
    left: 50%;
    transform: translateX(-50%);
    
    width: 92%;
    height: 92%;
    
    /* 4. 如果觉得图片整体还是偏上，可以通过 margin-top 微调 */
    margin-top: 5%; 
    
    transition: bottom 0.08s ease-out;
    cursor: pointer;
    user-select: none;
    -webkit-user-drag: none;
}

.mole.up {
    /* 5. 这里控制“冒头”的位置，数字越大，地鼠就越靠上 */
    /* 如果想让它往下点，把这个 10% 减小，比如改成 5% 或 2% */
    bottom: 5%; 
}

        #timer-display { font-size: 24px; font-weight: bold; color: #aaa; }

.distort-active {
            animation: screenDistort 0.5s ease-in-out;
        }

        @keyframes screenDistort {
            0% { transform: scale(1); filter: hue-rotate(0deg); }
            50% { transform: scale(1.05) rotate(2deg); filter: hue-rotate(90deg); }
            100% { transform: scale(1); filter: hue-rotate(0deg); }
        }
        /* 到这里结束 */

/* 添加到你的 <style> 中 */
.poison-mushroom-active {
    /* 关键：引用上面定义的 SVG 滤镜 ID */
    filter: url(#mushroom-distort);
    
    /* 可选：加一点迷幻的色彩旋转，更有吃了毒蘑菇的感觉 */
    animation: hueFever 5s linear indefinite;
    
    /* 确保扭曲时不会露出外面的背景 */
    transform: scale(1.05); 
    transition: filter 0.3s ease;
}

/* 迷幻色彩动画 */
@keyframes hueFever {
    0% { filter: url(#mushroom-distort) hue-rotate(0deg); }
    100% { filter: url(#mushroom-distort) hue-rotate(360deg); }
}


        /* ================= 右侧商店区 ================= */
        #shop-area {
            flex: 3;
            background: var(--panel-bg);
            border-left: 2px solid #2c2c2c;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        #shop-title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            color: #fff;
        }
        #shop-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #shop-list::-webkit-scrollbar { width: 0; }

        .shop-item {
            display: flex;
            align-items: center;
            background: #252525;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid #3a3a3a;
            transition: background 0.2s;
            height: 100px; /* 略微调高一点以容纳文本 */
            box-sizing: border-box;
        }
        .shop-item.locked { filter: grayscale(1); opacity: 0.3; }
        .item-icon { width: 55px; height: 55px; margin-right: 15px; border-radius: 8px; object-fit: cover;}
        .item-info { flex: 1; }
        .item-name { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 4px;}
        .item-desc { font-size: 12px; color: #aaa; line-height: 1.3;}
        .item-price { font-size: 13px; color: var(--neon-gold); margin-top: 3px; font-weight: bold;}
        
        .buy-btn { 
            padding: 8px 16px; 
            cursor: pointer; 
            border: none;
            border-radius: 6px;
            background: #444;
            color: #fff;
            font-weight: bold;
            transition: all 0.2s;
        }
        .buy-btn.can-buy { background: #3498db; }
        .buy-btn.can-buy:hover { background: #2980b9; }

.float-text {
            position: fixed;
            color: var(--neon-gold);
            font-weight: bold;
            font-size: 18px; /* 调大一点更醒目 */
            pointer-events: none;
            /* z-index 设为 9999，确保在最顶层 */
            z-index: 9999; 
            text-shadow: 0 0 5px black, 0 0 10px black;
            /* 居中核心：将元素中心移到指定坐标 */
            transform: translateX(-50%); 
            animation: floatUp 1.2s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateX(-50%) translateY(0); opacity: 1; }
            100% { transform: translateX(-50%) translateY(-100px); opacity: 0; }
        }

        #umnos-overlay {
            position: fixed;
            inset: 0;
            /* 修改这里：20% 透明度的黑色背景 */
            background: rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        #umnos-img { width: 50px; transition: transform 0.8s ease-out; }

        .custom-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        .modal-content {
            background: #222;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #444;
            max-width: 300px;
        }
        .modal-btns { display: flex; justify-content: space-around; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="tutorial-overlay">
        <div style="color:white; margin-bottom:20px; text-align:center;">
            <h2 style="font-size: 32px; margin-bottom: 10px;">游戏教程</h2>
            <p style="color: #aaa; font-size: 18px;">点确定后进入游戏，准备好后点击左下角[开始游戏]正式开始！</p>
        </div>
        <img id="tutorial-img" src="assets/tutorial.png" alt="教程图">
        <button class="game-btn" style="margin-top: 30px;" onclick="closeTutorial()">确定</button>
    </div>

    <div id="umnos-overlay">
        <img id="umnos-img" src="assets/umnos.png" alt="复活">
    </div>

    <div id="doctor-modal" class="custom-modal" style="display:none;">
        <div class="modal-content">
            <h3 style="color: red; margin-bottom: 15px;">你确定要这样做？</h3>
            <div class="modal-btns">
                <button class="game-btn" style="background:#e74c3c" onclick="confirmDoctor(true)">确认</button>
                <button class="game-btn" style="background:#7f8c8d" onclick="confirmDoctor(false)">不要...</button>
            </div>
        </div>
    </div>

    <div id="main-container">
        <div id="game-area">
            <div id="top-ui">
                <div id="hp-ui">
                    <img id="hp-img" src="assets/hp1.png" alt="HP">
                </div>
                
            </div>

            <div id="score-display">积分: 0</div>

            <div id="grid"></div>

            <button id="ctrl-btn" class="game-btn">开始游戏</button>
            <div id="timer-display" style="visibility: hidden;">0s/20s</div>
        </div>

<div id="volume-control" style="position: absolute; bottom: 20px; left: 20px; z-index: 999; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px;">
    <div style="margin-bottom: 10px;">
        <label style="color: #aaa; font-size: 12px;">BGM</label>
        <input type="range" id="bgm-slider" min="0" max="1" step="0.1" value="0.5">
    </div>
    <div>
        <label style="color: #aaa; font-size: 12px;">音效</label>
        <input type="range" id="sfx-slider" min="0" max="1" step="0.1" value="0.5">
    </div>
</div>

        <div id="shop-area">
            <div id="shop-title">底层商店</div>
            <div id="shop-list"></div>
        </div>
    </div>

<script>

// 统一的全局音频状态
const audioSettings = {
    bgmVolume: 0.5,
    sfxVolume: 0.5
};

// 创建 Audio 对象
const bgm = new Audio('assets/bgm.mp3');
bgm.loop = true;

// 监听滑块
document.getElementById('bgm-slider').oninput = (e) => {
    audioSettings.bgmVolume = e.target.value;
    bgm.volume = audioSettings.bgmVolume;
};

document.getElementById('sfx-slider').oninput = (e) => {
    audioSettings.sfxVolume = e.target.value;
};

// 专业音效分发函数
function playSFX(src) {
    const sfx = new Audio('assets/' + src);
    sfx.volume = audioSettings.sfxVolume; // 独立音效音量
    sfx.play().catch(()=>{});
}

    const CONFIG = {
        totalGameTime: 20,
        baseRate: 1300,
        badMoleProb: 0.1,
        moleAnimTime: 80,
    };

    let state = {
        hp: 4,
        score: 0,
        combo: 0,
        molesHit: 0,
        currentTime: 0,
        isGameOver: true,
        currentSpeedScale: 1.0,
        isUmnosUsed: false,
        is92Used: false,
        isDoctorActive: false,
        moleTimeouts: [],
        activeMoleHole2: null,
        activeMoleHole: null,
        angel92Unlocked: false,
        isAngel92Active: false,
        globalMultiplier: 1.0,
        upgrades: {
            nianwei: 0, umnos: 0, darling: 0, angel92: 0, scissors: 0,
            shiny: 0, birth: 0, taste: 0, aim: 0, doctor: 0, pink: 0, 
            birthLonging: 0,  dance: 0, eraser: 0, two_year_celebration: 0
        }
    };

const SHOP_ITEMS = [
    { id: 'nianwei',      name: '廿未',       icon: 'assets/nianwei.png',     prices: [20, 200, 2000], max: 3, sfx: 'nianwei.mp3' },
    { id: 'birthLonging', name: '渴望诞生',   icon: 'assets/umtgr.png',      prices: [200, 800, 1600, 2800, 5000], max: 5, sfx: 'longing.mp3' },
    { id: 'umnos',       name: '重新分娩',   icon: 'assets/umnos.png',      prices: [500], max: 1, sfx: 'umnos2.mp3' },
    { id: 'darling',     name: '亲爱的',     icon: 'assets/darling.png',    prices: [150, 400, 900, 1500, 5000], max: 5, sfx: 'darling2.mp3' },
    { id: 'scissors',    name: '神奇剪刀',   icon: 'assets/shibaizuo.png', prices: [100, 200, 350, 500, 750, 1000, 1250, 1500, 2000, 3000], max: 10, sfx: 'scissors.mp3' },
    { id: 'shiny',       name: '闪闪发光的...', icon: 'assets/faguang.png',  prices: [1000, 2000, 3000, 4000, 5000], max: 5, sfx: 'shiny.mp3' },
    { id: 'birth',       name: '诞生之前',   icon: 'assets/danqian.png',    prices: [100, 200, 350, 500, 750, 1000, 1250, 1500, 2000, 3000], max: 10, sfx: 'birth.mp3' },
    { id: 'taste',       name: '美之味',     icon: 'assets/mzw.png',        prices: [1000, 2000, 3000, 5000, 8000], max: 5, sfx: 'taste.mp3' },
    { id: 'aim',         name: '高位瞄准',   icon: 'assets/imh.png',        prices: [600, 1000, 1500, 2000, 4000], max: 5, sfx: 'aim.mp3' },
    { id: 'angel92',     name: '天使92',     icon: 'assets/92.png',         prices: [0], max: 1, special: true, sfx: 'angel.mp3' },
    { id: 'doctor',      name: '魔法医生',   icon: 'assets/moyi.png',       prices: [6666], max: 1, sfx: 'doctor.mp3' },
    { id: 'pink',        name: 'Pink',       icon: 'assets/pink.png',       max: 100, sfx: 'pink.mp3', prices: Array.from({length: 100}, (_, i) => Math.floor(15 * Math.pow(1.35, i))) },
    { id: 'dance',       name: '生命之舞',   icon: 'assets/mw.png',         prices: [100, 200, 400, 600, 800, 1000, 1200], max: 7, sfx: 'dance.mp3' },
    { id: 'eraser',      name: '少女橡皮擦', icon: 'assets/xpc.png',        prices: [400], max: 1, sfx: 'eraser.mp3' },
    { id: 'two_year_celebration',      name: '???', icon: 'assets/mrttt.png',        prices: [100000], max: 1},

];

    const grid = document.getElementById('grid');
    for (let i = 0; i < 25; i++) {
        const hole = document.createElement('div');
        hole.className = 'hole';
        hole.dataset.index = i;
        const mole = document.createElement('img');
        mole.className = 'mole';
        hole.appendChild(mole);
        grid.appendChild(hole);
    }

    const holes = document.querySelectorAll('.hole');
    const hpImg = document.getElementById('hp-img');
    const scoreDisp = document.getElementById('score-display');
    const ctrlBtn = document.getElementById('ctrl-btn');
    const timerDisp = document.getElementById('timer-display');
    const speedDisp = document.getElementById('speed-ui');
    
    let timeLoop;

function playSFX(src) {
    const audio = new Audio('assets/' + src);
    audio.volume = audioSettings.sfxVolume; 
    audio.play().catch(()=>{});
}

// 专门处理 BGM 的函数

function playBGM() {

    bgm.volume = audioSettings.bgmVolume;

    bgm.play().catch(()=>{});

}

    function closeTutorial() {

        document.getElementById('tutorial-overlay').style.display = 'none';

    }



    function getItemDesc(id, lv) {

        const spanY = (num) => `<span style="color:yellow">${num}</span>`;

        switch(id) {

            case 'nianwei': 

                return `每满${spanY(20)}个...，积分就会增加${spanY((lv||1)*50)}%（可无限叠加哦！）`;

            case 'birthLonging': 

                return `一开始他就可以满${spanY((lv*15)||15)}个...`;

            case 'scissors': return `能够剪掉${spanY((lv * 5) || 5)}%个刘海（什么！？）`;

            case 'umnos': return `获得一次“重生”的机会（大概）`;

            case 'darling': return `Darling会保护你${spanY(lv||1)}次`;

            case 'angel92': 

    return (Math.floor(state.score) === 92 || state.upgrades.angel92 > 0) ? `⁽⁽ଘ( ˊᵕˋ )ଓ⁾⁾*：天使の数字会让你“积分翻倍！”` : `未解锁：这个东西需要满足一些东西才能购买...`;

            case 'shiny': return `Mind Brand们现在有${spanY((lv||1)*2)}%的概率变为闪闪发光的`;

            case 'birth': return `让你从负${spanY((lv||1)*3)}秒时开始游戏`;

            case 'taste': return `你现在可以吃掉她...每${spanY(40 - (lv*3))}个能让你回复血量`;

            case 'aim': return `你现在有${spanY((lv||1)*2)}%的概率暴击，获得300%积分  I'm(≧A≦)HIGH!!!`;

            case 'doctor': return `<span style="color:red">购买后或许会有不太好的事情发生...</span>`;

            case 'pink': 

                const totalBonus = (Math.pow(1.15, lv) - 1) * 100;

                return `你好！我能让Mind Brand的价值+15%（乘算哦!!）。当前总加成: ${spanY(totalBonus.toFixed(1))}%`;

case 'dance': 

    return `生命之舞会让你每次敲打Mind Brand后有 ${spanY((lv||1)*4)}% 概率+1s ^_^`;

case 'eraser': return `橡皮擦会帮你擦出来一个全新的Mind Brand！`;
case 'two_year_celebration': 
    return `???`;



            default: return '';

        }

    }



function initShop() {
    const list = document.getElementById('shop-list');

    // 1. 获取所有普通道具并排序
    const normalItems = SHOP_ITEMS.filter(i => 
        !i.special && i.id !== 'doctor' && i.id !== 'two_year_celebration'
    ).sort((a,b) => {
        const priceA = state.upgrades[a.id] >= a.max ? Infinity : a.prices[state.upgrades[a.id]];
        const priceB = state.upgrades[b.id] >= b.max ? Infinity : b.prices[state.upgrades[b.id]];
        return priceA - priceB;
    });

    // 2. 查找特殊道具
    const angelItem = SHOP_ITEMS.find(i => i.id === 'angel92');
    const doctorItem = SHOP_ITEMS.find(i => i.id === 'doctor');
    const celebrationItem = SHOP_ITEMS.find(i => i.id === 'two_year_celebration'); // 新增查找

    // 3. 【关键修改】拼接逻辑：普通道具 -> 天使92 -> 医生 -> 周年道具(最后)
    const finalItems = [...normalItems, angelItem, doctorItem, celebrationItem];

    list.innerHTML = finalItems.map(item => {
        // 如果找不到该道具（防御性编程），跳过
        if (!item) return ''; 

        const curLv = state.upgrades[item.id] || 0;
        const maxed = curLv >= item.max;
        
        // 处理没有 prices 数组的道具（比如 Pink）
        const price = item.prices ? item.prices[curLv] : 0; 
        const canAfford = state.score >= price;
        
        // 天使92的锁定逻辑
        const is92Locked = item.id === 'angel92' && state.upgrades.angel92 === 0 && Math.floor(state.score) !== 92;

        let btnHtml = '';
        // 如果是周年道具，设置特殊的购买按钮
        if (item.id === 'two_year_celebration') {
            btnHtml = `<button class="buy-btn ${state.score >= 100000 ? 'can-buy':''}" onclick="buyItem('two_year_celebration')">购买</button>`;
        } else if (!item.special || (item.id === 'angel92' && !is92Locked)) {
            const btnText = curLv === 0 ? "购买" : "升级";
            if (!maxed) {
                btnHtml = `<button class="buy-btn ${canAfford?'can-buy':''}" onclick="buyItem('${item.id}')">${btnText}</button>`;
            } else {
                btnHtml = `<button class="buy-btn" disabled style="opacity:0.5; cursor:not-allowed;">满级</button>`;
            }
        }

        return `
            <div class="shop-item ${is92Locked ? 'locked' : ''}" id="item-${item.id}">
                <img src="${item.icon}" class="item-icon">
                <div class="item-info">
                    <div class="item-name">${item.name} ${item.max > 1 ? `<span style="color:#2ecc71">Lv.${curLv}</span>` : ''}</div>
                    <div class="item-desc">${getItemDesc(item.id, curLv)}</div>
                    <div class="item-price">${is92Locked ? '条件未达成' : (maxed ? 'MAX' : '价格: ' + price)}</div>
                </div>
                ${btnHtml}
            </div>
        `;
    }).join('');
}


function buyItem(id) {

    const item = SHOP_ITEMS.find(i => i.id === id);

if (id === 'two_year_celebration') {
        if (state.score >= 100000) {
            state.score -= 100000;
            triggerTwoYearCelebration();
        } else {
            showFloatingText("积分不足...", window.innerWidth/2, window.innerHeight/2);
        }
        return;
    }

    const curLv = state.upgrades[id];

    const price = item.prices[curLv];



    if (curLv < item.max && state.score >= price) {

        // 如果是医生，我们仍然保留弹窗确认逻辑

        if (id === 'doctor') {

            document.getElementById('doctor-modal').style.display = 'flex';

            return;

        }



        // --- 核心改动：播放专属音效 ---

        if (item.sfx) {

            playSFX(item.sfx);

        } else {

            playSFX('default_buy.mp3'); // 给一个兜底的默认音效

        }



        state.score -= price;

        state.upgrades[id]++;

        updateUI();

        initShop();

    }

}

function confirmDoctor(yes) {

        document.getElementById('doctor-modal').style.display = 'none';

        if (yes) {

            const price = 666;

            if (state.score >= price) {

                state.score -= price;

                state.upgrades.doctor = 1;

                state.isDoctorActive = true; // 激活状态

                

                // --- 关键：触发扭曲动画 ---

                document.body.classList.add('distort-active');

                setTimeout(() => document.body.classList.remove('distort-active'), 500);

                

                playSFX('doctor.mp3');

                showFloatingText("正在进行微调...", window.innerWidth/2, window.innerHeight/2);

                

                updateUI();

                initShop();

            }

        }

    }

function startGame() {

    if (!state.isGameOver) return;



    // 1. 重置基础配置

    CONFIG.totalGameTime = 20; 

    state.currentTime = - (state.upgrades.birth * 3);

    

    // 2. 清理场面

    state.activeMoleHole = null;

    state.activeMoleHole2 = null;

    document.querySelectorAll('.mole').forEach(mole => {

        mole.classList.remove('up');

        mole.style.cssText = ''; 

    });



    // 3. 重置局内核心状态

    state.hp = 4;

    state.combo = state.upgrades.birthLonging * 15;

    state.molesHit = 0;

    state.isUmnosUsed = false;

    state.is92Used = false;

    state.isDoctorActive = false;

    state.currentSpeedScale = 1.0;

    state.isGameOver = false;



// 4. 【核心修复】自动挂载逻辑 (放在重置之后)

    // 必须是玩家真正在商店购买了（等级>0）才会激活

    if (state.upgrades.angel92 > 0) {

        state.isAngel92Active = true;

        state.globalMultiplier = 2.0;

    } else {

        state.isAngel92Active = false;

        state.globalMultiplier = 1.0;

    }

    

    // 5. 启动循环

    bgm.play().catch(e => console.log("等待用户交互后播放"));

    updateUI();

    timerDisp.innerText = `${state.currentTime}s/${CONFIG.totalGameTime}s`;

    timerDisp.style.visibility = 'visible';

    ctrlBtn.style.visibility = 'hidden';



    nextMole();



    timeLoop = setInterval(() => {

        state.currentTime++;

        timerDisp.innerText = `${state.currentTime}s/${CONFIG.totalGameTime}s`;

        if (state.currentTime >= CONFIG.totalGameTime) {

            gameOver();

        }

    }, 1000);

}

// 1. 统一生成逻辑

function nextMole() {

if (state.activeMoleHole !== null || state.activeMoleHole2 !== null) return;

    if (state.isGameOver) return;



    // 清空状态

    state.activeMoleHole = null;

    state.activeMoleHole2 = null;



    // 随机生成

    spawnMole(1);

    

    // 如果有橡皮擦，生成第二个

    if (state.upgrades.eraser > 0) {

        spawnMole(2);

    }

}



// 2. 封装生成函数

function spawnMole(slot) {

    let randomIndex;

    do {

        randomIndex = Math.floor(Math.random() * 25);

    } while (randomIndex === (slot === 1 ? state.activeMoleHole2 : state.activeMoleHole));



    if (slot === 1) state.activeMoleHole = randomIndex;

    else state.activeMoleHole2 = randomIndex;



    const hole = holes[randomIndex];

    const moleImg = hole.querySelector('.mole');

    

    // --- 实时概率计算 ---

    const rand = Math.random();

    

    // 1. 坏地鼠：基础 0.10，每级剪刀 -0.5%

    const badProb = Math.max(0, 0.10 - (state.upgrades.scissors * 0.005));

    

    // 2. 医生：购买后 1%，没买为 0

    const doctorProb = state.upgrades.doctor > 0 ? 0.006 : 0;

    

let type = 'good';

    if (rand < badProb) {

        type = 'bad';

    } else if (rand < badProb + doctorProb) {

        type = 'doctor';

    } else {

        type = 'good';

        // 【新增 1】检查是否有“闪闪发光...”的升级，并进行概率判定

        if (state.upgrades.shiny > 0) {

            // 根据商店描述，每级增加 2% 的发光概率

            const shinyProb = state.upgrades.shiny * 0.02; 

            if (Math.random() < shinyProb) {

                type = 'shiny';

            }

        }

    }

    // -------------------



    moleImg.src = type === 'bad' ? 'assets/liuhai.png' : (type === 'doctor' ? 'assets/moyi.png' : 'assets/mb.png');

    moleImg.dataset.type = type;



    // 【新增 2】清空上一次可能残留的滤镜，防止普通地鼠也跟着发光

    moleImg.style.filter = '';



    // 【新增 3】如果是发光地鼠，用纯代码（CSS滤镜）直接拉满发光特效！

    if (type === 'shiny') {

        // drop-shadow 营造霓虹外发光，brightness 和 contrast 让整体色彩更亮更具冲击力

        moleImg.style.filter = 'drop-shadow(0 0 20px #ffee55) brightness(1.3) contrast(1.1)';

    }



moleImg.classList.add('up');

let hit = false;



const finishMole = () => {

    moleImg.classList.remove('up');

    

    if (slot === 1) state.activeMoleHole = null;

    else state.activeMoleHole2 = null;



    // 只有当两个槽位都空时，再尝试进行下一步

    if (state.activeMoleHole === null && state.activeMoleHole2 === null) {

        

        // 核心改动：用一个共同的逻辑处理下一步

        const attemptNext = () => {

            // 【关键锁】只要游戏结束，绝对不执行 nextMole

            if (state.isGameOver) return;

            nextMole();

        };



        const fallback = setTimeout(attemptNext, 250); // 稍微延长一点点兜底时间更安全



        moleImg.addEventListener('transitionend', () => {

            clearTimeout(fallback);

            attemptNext();

        }, { once: true });

    }

};

// 绑定点击

    moleImg.onpointerdown = (e) => {

        e.stopPropagation();

        if (hit) return;

        hit = true;

        handleHit(type, e.clientX, e.clientY);

        finishMole(); // 击中后执行收尾

    };



// 自动缩回计时器

    let duration = CONFIG.baseRate

    if (type === 'bad') duration = 750;



// 【修复4】把每个地鼠的定时器都存进数组

state.moleTimeouts.push(setTimeout(() => {

    if (state.isGameOver) return;

    if (!hit) {

        if (type !== 'bad' && type !== 'doctor') takeDamage();

        finishMole();

    }

}, duration));

}

    holes.forEach(h => {

        h.onpointerdown = (e) => {

            if (e.target === h && !state.isGameOver) {

                e.stopPropagation();

                playSFX('cuo.mp3');

                takeDamage();

            }

        };

    });



function handleHit(type, x, y) {

        if (type === 'bad') {

            playSFX('cuo.mp3');

            takeDamage();

        } 

        // --- 新增：捕捉魔法医生 ---

else if (type === 'doctor') {

            playSFX('magic.mp3'); 

            showFloatingText("医医医医生...我的病还能治好吗？！！（积分x5）", x, y);



            const container = document.getElementById('main-container');

            container.classList.add('poison-mushroom-active');

            

            // 激活加成状态

            state.isDoctorActive = true; 

            

            clearTimeout(window.mushroomTimer); 

            window.mushroomTimer = setTimeout(() => {

                container.classList.remove('poison-mushroom-active');

                

                // 关键点：在这里重置状态！

                state.isDoctorActive = false; 

                

                showFloatingText("...正常了...？", window.innerWidth/2, window.innerHeight/2);

            }, 8000);

            

            state.molesHit++;

            state.combo++; 

        }

        // -------------------------

        else {

            playSFX('zhong.mp3');

            state.molesHit++;

            state.combo++;



// --- 新增：生命之舞逻辑 ---

    if (state.upgrades.dance > 0) {

        const chance = state.upgrades.dance * 0.04;

        if (Math.random() < chance) {

            CONFIG.totalGameTime += 1; // 增加最大时间限制

            showFloatingText("+1s", x, y - 40);

        }

    }



            let gain = 1.0; 

            gain *= state.globalMultiplier;



            showFloatingText(`满${state.combo}个...`, x, y);



            if (state.upgrades.pink > 0) {

                gain *= Math.pow(1.15, state.upgrades.pink);

            }



            // 廿未升级逻辑：连击超过20/40/60... 累计增加

            if (state.upgrades.nianwei > 0 && state.combo >= 20) {

                const step = Math.floor(state.combo / 20); // 连击阶段

                const bonusPerStep = state.upgrades.nianwei * 0.5; // 每阶段加成(50% * 等级)

                gain *= (1.0 + (step * bonusPerStep));

            }

            

            if (type === 'shiny') gain *= 6.0;



            if (Math.random() < (state.upgrades.aim * 0.02)) {

                gain *= 3.0;

                // 💡 视觉反馈：文案更具冲击力

                showFloatingText("I'M HIGH!!!", x, y + 20); 

    

  // 💡 听觉反馈：增加暴击专属音效 (建议文件名: crit.mp3)

                playSFX('crit.mp3');



            }



            if (state.isDoctorActive) gain *= 6.0;

            state.score += gain; 

            

            const needed = 40 - (state.upgrades.taste * 3);

            if (state.molesHit % needed === 0 && state.hp < 4) {

                state.hp++;

                updateUI();

            }

        }

        updateUI();

    }



function takeDamage() {

        if (state.isGameOver) return;

        // 只要有保护就触发，不需要 combo > 0 的限制

        if (state.upgrades.darling > 0) {

            state.upgrades.darling--; 

            playSFX('ball.mp3');

            showFloatingText("这种事我没有听说过啊！", window.innerWidth/2, window.innerHeight/2);

            initShop();

            return; // 保护生效，直接退出，不扣血也不清空连击

        }



        // 只有没保护时才走到这里

        state.hp--;

        state.combo = 0; // 【这里才是清空连击的地方！】

        

        hpImg.classList.add('shake');

        setTimeout(() => hpImg.classList.remove('shake'), 350);

        

        if (state.hp <= 0) {

            if (state.upgrades.umnos > 0 && !state.isUmnosUsed) {

                triggerUmnos();

            } else {

                gameOver();

            }

        }

        updateUI();

    }

function triggerUmnos() {

        // 1. 彻底冻结游戏状态，防止在复活期间产生额外的点击或地鼠生成

        state.isGameOver = true; 

        state.isUmnosUsed = true;



// 【修复1】冻结全局时间，防止复活期间时间耗尽

    clearInterval(timeLoop);

        

        // 2. 清除所有可能的残留计时器，确保游戏逻辑完全暂停

        // 【修复4】清空所有残留的地鼠定时器

state.moleTimeouts.forEach(clearTimeout);

state.moleTimeouts = [];;

        state.currentMoleTimeout = null;

        

        // 3. 清理所有地鼠的视觉状态（强制所有地鼠缩回，避免出现多个地鼠）

        const allMoles = document.querySelectorAll('.mole');

        allMoles.forEach(moleImg => {

            moleImg.classList.remove('up');

        });

        

        // 4. 清除洞口的阴影效果

        holes.forEach(h => h.style.boxShadow = "none");



        // 5. 显示半透明复活遮罩层 (CSS 已设置为 rgba(0,0,0,0.2))

        const overlay = document.getElementById('umnos-overlay');

        const img = document.getElementById('umnos-img');

        overlay.style.display = 'flex';

        playSFX('umnos.mp3');



// 6. 显示“你是什么错都没有的！！”提示

// X 直接使用 window.innerWidth / 2，Y 稍微偏上 50px

showFloatingText(

    "你是什么错都没有的！！", 

    window.innerWidth / 2, 

    window.innerHeight / 2 - 50

);

        // 7. 执行复活视觉动画

        setTimeout(() => {

            img.style.transform = 'scale(10)'; // 缩短缩放动画系数

            setTimeout(() => {

                // 动画结束，移除遮罩

                overlay.style.display = 'none';

                img.style.transform = 'scale(1)';

                

                // 8. 重置HP并恢复游戏逻辑

                state.hp = 1;

                state.isGameOver = false;

                state.activeMoleHole = null;

    state.activeMoleHole2 = null;



timeLoop = setInterval(() => {

            state.currentTime++;

            timerDisp.innerText = `${state.currentTime}s/${CONFIG.totalGameTime}s`;

            if (state.currentTime >= CONFIG.totalGameTime) {

                gameOver();

            }

        }, 200);

                

                // 9. 重新开始生成地鼠

                nextMole(); 

                updateUI();

            }, 2000); 

        }, 100);

    }

    function gameOver() {



// 1. 立即锁定按钮，防止连点

    ctrlBtn.disabled = true;

    ctrlBtn.style.opacity = '0.5';



    playSFX('die.mp3');



    state.isGameOver = true;

    clearInterval(timeLoop);

    // 【修复4】清空所有残留的地鼠定时器

state.moleTimeouts.forEach(clearTimeout);

state.moleTimeouts = [];



// 1. 确保分数计算精准：强制截断小数点，只取整数部分

const finalScore = Math.floor(state.score); 

console.log("游戏结束，整数分数:", finalScore); 



// 2. 解锁逻辑：使用 Math.floor 后，92.0 到 92.999... 都会被判定为 92

// 只要停在92分且还没买，就提示玩家可以去商店买了（分数变动后将失去机会）

if (finalScore === 92 && state.upgrades.angel92 === 0) {

    showFloatingText("ଘ( ˊᵕˋ )ଓ 天使92已在商店显现!", window.innerWidth/2, window.innerHeight/2);

    console.log("天使92短暂解锁");

}



    // 3. 将 UI 更新操作放在最后，确保不被中途打断

    timerDisp.style.visibility = 'hidden';

    ctrlBtn.style.visibility = 'visible';

    holes.forEach(h => h.querySelector('.mole').classList.remove('up'));

    

    // 如果 initShop 会重置界面，确保它不会清理掉刚才的解锁提示

    initShop();



    scoreDisp.style.color = 'var(--neon-green)';

    setTimeout(() => { scoreDisp.style.color = '#fff'; }, 1000);

setTimeout(() => {

        ctrlBtn.style.visibility = 'visible';

        ctrlBtn.disabled = false;

        ctrlBtn.style.opacity = '1';

        ctrlBtn.innerText = "开始游戏"; // 或者你之前的按钮文本

    }, 100);

}

    function updateUI() {

        const hpIndex = 5 - state.hp;

        hpImg.src = `assets/hp${hpIndex}.png`;

        scoreDisp.innerText = `积分: ${Math.floor(state.score)}`;

    }



function showFloatingText(txt, x, y) {

    const el = document.createElement('div');

    el.className = 'float-text';

    el.innerText = txt;

    // 直接传入窗口中心的 X 坐标

    el.style.left = x + 'px'; 

    el.style.top = y + 'px';

    document.body.appendChild(el);

    setTimeout(() => el.remove(), 1200);

}

function triggerTwoYearCelebration() {
    state.isGameOver = true;
    clearInterval(timeLoop);
    // 清理所有残留地鼠定时器
    state.moleTimeouts.forEach(clearTimeout);
    state.moleTimeouts = [];
    
    const celebrationDiv = document.createElement('div');
    celebrationDiv.style.cssText = `
        position: fixed; inset: 0; 
        background: rgba(0,0,0,0.95); 
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        z-index: 9999; color: gold; font-size: 40px;
        text-align: center; text-shadow: 0 0 20px #f1c40f;
        font-weight: bold; font-family: sans-serif;
    `;
    
    celebrationDiv.innerHTML = `
        <div style="animation: zoomIn 0.8s ease-out;">MARETU同人研学群</div>
        <div style="margin-top: 20px; animation: zoomIn 1.2s ease-out;">两周年快乐！！(*^▽^*)</div>
        <button id="restart-btn" onclick="location.reload()" style="margin-top: 40px; padding: 15px 30px; font-size: 20px; cursor: pointer; background: gold; border: none; border-radius: 8px; transition: transform 0.2s;">再玩一次</button>
    `;

    document.body.appendChild(celebrationDiv);
    
    const style = document.createElement('style');
    style.innerHTML = `
        @keyframes zoomIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        #restart-btn:hover { transform: scale(1.1); }
        #restart-btn:active { transform: scale(0.95); }
    `;
    document.head.appendChild(style);
}



// 修改后的 activateAngel92 函数

function activateAngel92() {

    // 删掉 !state.isGameOver 的限制，允许在开赛前或赛中预设

    if (state.angel92Unlocked && !state.is92Used) {

        state.is92Used = true;

        state.isAngel92Active = true;

        state.globalMultiplier = 2.0; 

       

        

    }

}



ctrlBtn.onclick = startGame;

    initShop();

                <animate 

                    attributeName="seed" 

                    from="1"

                    dur="10s" 

                    repeatCount="indefinite" />

            </feTurbulence>

                in="SourceGraphic"
